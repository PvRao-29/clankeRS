# cargo-deny configuration — supply-chain gate for the clankeRS workspace.
#
# Checked in CI (.github/workflows/ci.yml). Covers:
#   * advisories  — RUSTSEC vulnerabilities and yanked crates
#   * bans        — wildcard deps and (as a warning) duplicate versions
#   * licenses    — only an explicitly allowed set of licenses may ship
#   * sources     — crates must come from crates.io (no unknown registries/git)
#
# The real DDS packages under ros2/ are excluded from the Cargo workspace, so
# their yanked ROS message-crate deps never reach this graph.

[graph]
all-features = true

[advisories]
yanked = "deny"
ignore = [
    # `paste` is unmaintained (RUSTSEC-2024-0436) but has no safe upgrade; it
    # reaches us only transitively through `mcap`. Revisit when mcap drops it.
    "RUSTSEC-2024-0436",
]

[licenses]
# Permissive licenses used across the dependency tree. Adding a new dependency
# with a license not listed here is a deliberate review point.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "MPL-2.0",
    # Root certificate bundle shipped via ONNX Runtime's TLS dependency.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8
# Keep a forward-looking allow list without warning about entries that the
# current dependency tree happens not to use yet.
unused-allowed-license = "allow"
# The example crates under examples/ are `publish = false`; don't require a
# license expression for unpublished workspace members.
private = { ignore = true }

[bans]
multiple-versions = "warn"
# Deny real `*` version requirements, but allow internal path dependencies
# (the workspace crates depend on each other by path, which reads as a wildcard).
wildcards = "deny"
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
