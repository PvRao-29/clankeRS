name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Least privilege: CI only needs to read the repo. The publish job opts into OIDC.
permissions:
  contents: read

# Cancel superseded runs on the same ref so pushes don't pile up runners.
# Never cancel an in-flight release when another workflow starts.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  CARGO_TERM_COLOR: always

jobs:
  # Gate 1: the code is formatted, lint-clean, and tested.
  check:
    name: fmt / clippy / test
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

  # Gate 2: feature-gating stays healthy — the sim-only build (no ONNX backend)
  # must compile, and the ml crate's backend-disabled path must still pass.
  no-default-features:
    name: no-default-features (sim only)
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build workspace without default features
        run: cargo build --workspace --no-default-features
      - name: Test ml crate with the ONNX backend disabled
        run: cargo test -p clankers-ml --no-default-features

  # Gate 3: documentation builds and intra-doc links resolve.
  docs:
    name: doc links
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc (deny broken links)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --all-features

  # Gate 4: supply chain — advisories, licenses, banned/wildcard deps, sources.
  deny:
    name: cargo-deny
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  # Gate 5: the golden path. One command sequence that must never break:
  # PyTorch-exported ONNX -> clankeRS validation -> Rust inference -> MCAP replay.
  golden-path:
    name: golden path (PyTorch -> ONNX -> Rust -> replay)
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Inspect sample MCAP
        run: cargo run -p clankers-cli -- inspect sample_data/camera_log.mcap

      - name: Validate PyTorch-exported ONNX (policy model)
        run: cargo run -p clankers-cli -- validate-model --onnx sample_data/models/policy.onnx

      - name: Validate PyTorch-exported ONNX (camera detector)
        run: >-
          cargo run -p clankers-cli -- validate-model
          --onnx sample_data/models/detector.onnx
          --samples sample_data/detector_inputs

      - name: Run the vertical slice (replay -> preprocess -> ONNX -> detections)
        run: cargo run --example camera_replay

      - name: Run ONNX inference node (live pub/sub)
        run: cargo run -p camera_perception_node

  # Release: publish workspace crates to crates.io via Trusted Publishing (OIDC).
  # Configured on crates.io as workflow filename `ci.yml`, environment `release`.
  publish:
    name: publish to crates.io
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish workspace crates (bottom-up)
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail
          crates=(
            clankers-core
            clankers-macros
            clankers-ros2
            clankers-geometry
            clankers-runtime
            clankers-tensor
            clankers-ml
            clankers-data
            clankers-testing
            clankers-cli
            clankers
          )
          for c in "${crates[@]}"; do
            echo ">> publishing $c"
            if cargo publish -p "$c" 2> >(tee /tmp/publish.err >&2); then
              echo ">> published $c"
            elif grep -q "already exists on crates.io index" /tmp/publish.err; then
              echo ">> skip $c (version already on crates.io)"
            else
              exit 1
            fi
          done
